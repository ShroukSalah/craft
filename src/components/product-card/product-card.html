<div class="card h-100">
    <div class="card-header p-0 border-0 overflow-hidden">
        <img [src]="productCard.image" class="w-full" alt="product 1">
    </div>
    <div class="card-body">
        <h5 class="card-title lg:!text-[15px] !text-[13px]">{{productCard.title}}</h5>
        <p class="card-text font-bold">{{productCard.price}}</p>
        <button class="btn !bg-[#829186] text-white !rounded-[50px] border-0 !text-sm">
            Add To Card
        </button>
    </div>
</div>
